name: petgraph

# ─────────────────────────────────────────────────────────────────────────────
# PetGraph — one-command run:
#
#   1. Create a .env file next to this compose file:
#        OPENAI_API_KEY=sk-...
#      (optional — without it, seed data / graph / reminders / insights /
#       conflicts all work; only Ask, upload, and Visit prep need the key)
#   2. docker compose up --build
#   3. Open http://localhost:5173  (or http://127.0.0.1:5173)
#
# Ports can be remapped if taken on your machine:
#   API_PORT=8010 UI_PORT=5180 docker compose up
#
# Cognee runs fully embedded (Kuzu graph + LanceDB vectors) inside the API
# container; everything persists in the petgraph-data volume. No external
# databases are needed or supported — the app's graph layer speaks Cypher to
# Cognee's embedded Kuzu engine.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PetGraph API (FastAPI) ──────────────────────────────────────────────────
  petgraph-api:
    container_name: petgraph-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app              # bind-mount source → live --reload
      - /app/.venv                  # keep container's venv, not the host's
      - petgraph-data:/data         # persistent SQLite + Cognee stores
    environment:
      # Storage paths
      - DATA_DIR=/data
      - SEED_DOCS_DIR=/app/seed_documents
      # LLM provider
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      # Cognee reads LLM_API_KEY (same as the OpenAI key)
      - LLM_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=https://api.openai.com/v1
      - COGNEE_SKIP_CONNECTION_TEST=true
      - ENABLE_BACKEND_ACCESS_CONTROL=false
      - CACHING=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s   # Cognee SDK init can take 30-60 s on cold start

  # ── PetGraph UI (Vite + React) ─────────────────────────────────────────────
  petgraph-ui:
    container_name: petgraph-ui
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${UI_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src            # live HMR — source changes reflected instantly
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - /app/node_modules                  # keep container's installed packages
    environment:
      - VITE_API_TARGET=http://petgraph-api:8000
    depends_on:
      petgraph-api:
        condition: service_healthy

volumes:
  petgraph-data:   # SQLite petgraph.db + Cognee Kuzu/LanceDB stores
